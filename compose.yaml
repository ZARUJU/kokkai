services:
  api:
    build: .
    command: uvicorn kokkai.api.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://kokkai:kokkai@db:5432/kokkai
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: kokkai
      POSTGRES_USER: kokkai
      POSTGRES_PASSWORD: kokkai
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
